<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orion Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@300..600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the saved theme before first paint (dark by default) so the
      // app never flashes the wrong palette. Mirrors src/useTheme.ts.
      (function () {
        try {
          var t = localStorage.getItem('orion-theme')
          if (t !== 'light') document.documentElement.classList.add('dark')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
