<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Orion Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@300..600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the saved theme before first paint (dark by default) so the
      // app never flashes the wrong palette. Mirrors src/useTheme.ts.
      (function () {
        try {
          var t = localStorage.getItem('orion-theme')
          if (t !== 'light') document.documentElement.classList.add('dark')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
              console.log('PWA ServiceWorker registered with scope: ', reg.scope);
            })
            .catch(function(err) {
              console.error('PWA ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
